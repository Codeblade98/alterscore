version: "3.9"

services:
  alterscore:
    build: .
    container_name: alterscore_app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # Persist DB + trained models
    environment:
      - DATABASE_URL=sqlite:///./data/alterscore.db
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
